<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: transparent; font-family: sans-serif; }
        #container { padding: 4px; }
        #notice {
            font-size: 12px;
            color: #aaa;
            padding: 0 2px 6px;
            line-height: 1.4;
        }
        video { width: 100%; border-radius: 8px; display: block; }
        #status {
            text-align: center;
            padding: 8px 4px 4px;
            font-size: 13px;
            color: #888;
        }
        #status.found { color: #21c354; }
        #status.error { color: #f44336; }
    </style>
</head>
<body>
    <div id="container">
        <p id="notice">
            Camera is used only to read the QR code printed on the barrel label.
            Video is processed locally in your browser and is never stored or transmitted.
        </p>
        <video id="video" playsinline autoplay muted></video>
        <p id="status">Initializing camera...</p>
        <canvas id="canvas" style="display:none;"></canvas>
    </div>

    <!-- jsQR vendored locally — no CDN dependency -->
    <script src="jsQR.min.js"></script>
    <script>
        // Lock postMessage to the Streamlit app's origin (same host).
        // window.location.origin is the component's own origin, which Streamlit
        // serves from the same host as the parent app.
        var STREAMLIT_ORIGIN = window.location.origin;

        function postToStreamlit(type, extra) {
            window.parent.postMessage(
                Object.assign({ isStreamlitMessage: true, type: type }, extra),
                STREAMLIT_ORIGIN
            );
        }

        function setHeight() {
            postToStreamlit("streamlit:setFrameHeight", {
                height: document.getElementById("container").scrollHeight + 16
            });
        }

        function setValue(value) {
            postToStreamlit("streamlit:setComponentValue", {
                value: value,
                dataType: "json"
            });
        }

        // Validate that the extracted value looks like a QR code ID or app URL before returning it.
        function extractQrId(raw) {
            // Accept a full app URL and extract the qr param
            if (raw.indexOf("?qr=") !== -1) {
                raw = raw.split("?qr=")[1].split("&")[0];
            }
            // Only accept QR-XXXXXX format (alphanumeric after QR-)
            if (/^QR-[A-Z0-9]{4,10}$/i.test(raw)) {
                return raw.toUpperCase();
            }
            return null;
        }

        // Signal to Streamlit that the component is ready
        postToStreamlit("streamlit:componentReady", { apiVersion: 1 });

        var video = document.getElementById("video");
        var canvas = document.getElementById("canvas");
        var ctx = canvas.getContext("2d");
        var status = document.getElementById("status");
        var found = false;

        // Request rear camera with continuous focus (helps Android phones
        // lock onto a close QR sticker on barrel labels).
        navigator.mediaDevices.getUserMedia({
            video: {
                facingMode: { ideal: "environment" },
                width: { ideal: 1280 },
                height: { ideal: 720 },
                advanced: [
                    { focusMode: "continuous" },
                    { focusMode: "auto" }
                ]
            }
        })
        .then(function(stream) {
            video.srcObject = stream;
            video.play();
            status.textContent = "🔍 Scanning — hold QR code steady...";
            setHeight();
            // Try to apply continuous focus / torch via applyConstraints when
            // the initial constraints object did not honor it.
            try {
                var track = stream.getVideoTracks()[0];
                if (track && typeof track.applyConstraints === "function") {
                    var caps = (track.getCapabilities && track.getCapabilities()) || {};
                    if (caps.focusMode && caps.focusMode.indexOf("continuous") !== -1) {
                        track.applyConstraints({ advanced: [{ focusMode: "continuous" }] }).catch(function(){});
                    }
                }
            } catch (e) { /* non-fatal */ }
            requestAnimationFrame(scan);
        })
        .catch(function(err) {
            status.className = "error";
            // Show a user-friendly message without leaking internal error details
            status.textContent = "Could not access camera. Please allow camera permission and try again.";
            setHeight();
        });

        // Tap on video to trigger a single-shot autofocus on supported devices.
        video.addEventListener("click", function() {
            try {
                var stream = video.srcObject;
                if (!stream) return;
                var track = stream.getVideoTracks()[0];
                if (track && track.applyConstraints) {
                    track.applyConstraints({ advanced: [{ focusMode: "single-shot" }] }).catch(function(){});
                }
            } catch (e) { /* ignore */ }
        });

        var frameCount = 0;
        function scan() {
            if (found) return;
            if (video.readyState === video.HAVE_ENOUGH_DATA) {
                // Center-crop to a square and downsample to ~480px for faster,
                // more reliable jsQR decoding on high-res Android cameras.
                var srcW = video.videoWidth;
                var srcH = video.videoHeight;
                var side = Math.min(srcW, srcH);
                var sx = Math.max(0, (srcW - side) / 2);
                var sy = Math.max(0, (srcH - side) / 2);
                var target = 480;
                canvas.width = target;
                canvas.height = target;
                ctx.drawImage(video, sx, sy, side, side, 0, 0, target, target);
                var imageData = ctx.getImageData(0, 0, target, target);
                // attemptBoth catches inverted/dark-background QR codes that
                // some Android cameras produce after exposure adjustment.
                var code = jsQR(imageData.data, imageData.width, imageData.height, {
                    inversionAttempts: "attemptBoth"
                });
                if (code) {
                    var val = extractQrId(code.data);
                    if (val) {
                        found = true;
                        // Stop the camera
                        video.srcObject.getTracks().forEach(function(t) { t.stop(); });
                        video.style.display = "none";
                        status.className = "found";
                        status.textContent = "✅ Detected: " + val;
                        setHeight();
                        setValue(val);
                        return;
                    }
                    // QR code found but not in expected format — keep scanning
                }
                frameCount++;
                // Refresh the status text every ~30 frames so the user can see
                // that the scan loop is alive even when no code is detected.
                if (frameCount % 30 === 0) {
                    status.textContent = "🔍 Scanning… tap video to refocus (" + frameCount + " frames)";
                }
            }
            requestAnimationFrame(scan);
        }
    </script>
</body>
</html>
